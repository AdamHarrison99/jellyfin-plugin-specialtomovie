overview: "Detects TV specials that are also movies, creates hard links, and syncs watch status."
description: |
  Automatically detects Season 0 episodes that are also standalone movies (e.g., El Camino,
  Downton Abbey: A New Era), creates hard links in your movie library, and bidirectionally
  syncs watch status between the episode and movie entries. Supports TMDB and TVDB lookups,
  dry run mode, configurable library mappings, and automatic cleanup.
